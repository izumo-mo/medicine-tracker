<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>頓服メモ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --text-muted: #6b6b88;
    --accent: #7c6af7;
    --accent-glow: rgba(124, 106, 247, 0.25);
    --success: #4fd1a1;
    --danger: #f76a6a;
    --warn: #f7b96a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,19,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
  }
  nav h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.02em; }
  nav h1 span { color: var(--accent); }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    background: none; border: none; color: var(--text-muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px; padding: 6px 12px; border-radius: 20px;
    cursor: pointer; transition: all 0.2s;
  }
  .nav-tab.active { background: var(--surface2); color: var(--text); }

  /* MAIN */
  .page { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
  .page.active { display: block; }

  /* RECORD PAGE */
  .time-display {
    text-align: center; padding: 20px 0 24px;
  }
  .time-display .clock {
    font-family: 'DM Mono', monospace;
    font-size: 38px; font-weight: 400; letter-spacing: -1px;
    color: var(--text);
  }
  .time-display .date-str {
    font-size: 13px; color: var(--text-muted); margin-top: 4px;
  }

  .section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    color: var(--text-muted); text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* MEDICINE BUTTONS */
  .medicine-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 28px;
  }
  .med-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px 16px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    position: relative; overflow: hidden;
  }
  .med-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent-glow);
    opacity: 0; transition: opacity 0.18s;
  }
  .med-btn:active { transform: scale(0.96); }
  .med-btn:active::before { opacity: 1; }
  .med-btn.flash { animation: flash 0.35s ease; }
  @keyframes flash {
    0% { border-color: var(--border); }
    40% { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    100% { border-color: var(--border); }
  }
  .med-dot {
    width: 10px; height: 10px; border-radius: 50%;
    margin-bottom: 10px;
  }
  .med-name {
    font-size: 15px; font-weight: 500;
    color: var(--text); line-height: 1.3;
  }
  .med-dose {
    font-size: 12px; color: var(--text-muted); margin-top: 3px;
  }
  .med-count-badge {
    position: absolute; top: 12px; right: 12px;
    background: var(--surface2);
    border-radius: 20px; padding: 2px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text-muted);
  }

  /* TABLET COUNTER */
  .tablet-selector {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 18px;
    margin-bottom: 20px;
  }
  .tablet-selector .label { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
  .tablet-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .tablet-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text); border-radius: 10px;
    width: 44px; height: 44px;
    font-family: 'DM Mono', monospace; font-size: 16px;
    cursor: pointer; transition: all 0.15s;
  }
  .tablet-btn.selected {
    background: var(--accent); border-color: var(--accent);
    color: #fff; box-shadow: 0 0 14px var(--accent-glow);
  }

  /* TOAST */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--accent);
    color: var(--text); font-size: 13px; padding: 10px 20px;
    border-radius: 30px; opacity: 0;
    transition: all 0.3s; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ADD MEDICINE */
  .add-med-card {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 16px; padding: 16px;
    cursor: pointer; text-align: center;
    color: var(--text-muted); font-size: 14px;
    transition: all 0.2s; margin-top: 4px;
  }
  .add-med-card:hover { border-color: var(--accent); color: var(--accent); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 200;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 36px;
    width: 100%; max-width: 500px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
  .modal input, .modal select {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px;
    padding: 12px 14px; font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 12px; outline: none;
    transition: border-color 0.2s;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .color-picker { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .color-dot {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2.5px solid transparent; transition: all 0.15s;
  }
  .color-dot.selected { border-color: #fff; transform: scale(1.15); }
  .modal-btns { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 12px;
    border: none; font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #9183f9; }
  .btn-secondary { background: var(--surface2); color: var(--text-muted); }

  /* LOG PAGE */
  .log-filter { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .filter-chip {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 20px;
    padding: 6px 14px; font-size: 12px; white-space: nowrap;
    cursor: pointer; transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .log-group { margin-bottom: 20px; }
  .log-date-header {
    font-size: 12px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 0.08em; margin-bottom: 8px;
    text-transform: uppercase;
  }
  .log-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
  }
  .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .log-info { flex: 1; }
  .log-name { font-size: 14px; font-weight: 500; }
  .log-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .log-time {
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text-muted);
  }
  .log-delete {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; padding: 4px; font-size: 16px;
    opacity: 0.5; transition: opacity 0.15s;
  }
  .log-delete:hover { opacity: 1; color: var(--danger); }

  /* STATS PAGE */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 400; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* CALENDAR */
  .calendar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
  .calendar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .calendar-header h3 { font-size: 15px; font-weight: 500; }
  .cal-nav { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 4px 10px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 12px; gap: 4px; }
  .cal-day-name { text-align: center; font-size: 11px; color: var(--text-muted); padding: 4px 0; letter-spacing: 0.05em; }
  .cal-cell {
    text-align: center; aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; border-radius: 8px;
    font-size: 13px; position: relative; cursor: default;
  }
  .cal-cell.other-month { color: var(--border); }
  .cal-cell.has-record { background: var(--surface2); }
  .cal-cell.today { border: 1.5px solid var(--accent); color: var(--accent); }
  .cal-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); margin-top: 2px;
  }

  /* BAR CHART */
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
  .chart-title { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar {
    width: 100%; border-radius: 4px 4px 0 0;
    background: var(--accent); min-height: 3px;
    transition: height 0.5s ease;
    position: relative;
  }
  .bar-label { font-size: 10px; color: var(--text-muted); }

  /* EMPTY STATE */
  .empty {
    text-align: center; padding: 48px 20px;
    color: var(--text-muted); font-size: 14px; line-height: 1.8;
  }
  .empty .emoji { font-size: 40px; display: block; margin-bottom: 12px; }

  /* SETTINGS */
  .med-manage-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
  }
  .med-manage-item .del-btn {
    background: none; border: 1px solid var(--border);
    color: var(--danger); border-radius: 8px; padding: 6px 12px;
    font-size: 12px; cursor: pointer; margin-left: auto;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .med-manage-item .del-btn:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
</style>
</head>
<body>

<nav>
  <h1>頓服<span>メモ</span></h1>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('record')">記録</button>
    <button class="nav-tab" onclick="showPage('log')">ログ</button>
    <button class="nav-tab" onclick="showPage('stats')">統計</button>
    <button class="nav-tab" onclick="showPage('settings')">設定</button>
  </div>
</nav>

<!-- RECORD PAGE -->
<div class="page active" id="page-record">
  <div class="time-display">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-str" id="dateStr">---</div>
  </div>

  <div class="tablet-selector">
    <div class="label">錠数を選択</div>
    <div class="tablet-btns" id="tabletBtns">
      <button class="tablet-btn selected" onclick="selectTablets(this,1)">1</button>
      <button class="tablet-btn" onclick="selectTablets(this,2)">2</button>
      <button class="tablet-btn" onclick="selectTablets(this,3)">3</button>
      <button class="tablet-btn" onclick="selectTablets(this,4)">4</button>
    </div>
  </div>

  <div class="section-label">薬を選択してタップ</div>
  <div class="medicine-grid" id="medicineGrid"></div>
  <div class="add-med-card" onclick="openAddModal()">＋ 薬を追加</div>
</div>

<!-- LOG PAGE -->
<div class="page" id="page-log">
  <div class="log-filter" id="logFilter">
    <button class="filter-chip active" onclick="filterLog(this,'all')">すべて</button>
  </div>
  <div id="logList"></div>
</div>

<!-- STATS PAGE -->
<div class="page" id="page-stats">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="calendar-wrap">
    <div class="calendar-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <h3 id="calTitle"></h3>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">過去7日間の服用錠数</div>
    <div class="bar-chart" id="barChart"></div>
  </div>
</div>

<!-- SETTINGS PAGE -->
<div class="page" id="page-settings">
  <div class="section-label" style="margin-top:8px">登録済みの薬</div>
  <div id="medManageList"></div>
  <div class="add-med-card" onclick="openAddModal()" style="margin-top:8px">＋ 薬を追加</div>
</div>

<!-- ADD MEDICINE MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>薬を追加</h3>
    <input type="text" id="newMedName" placeholder="薬の名前（例：カロナール）" maxlength="20">
    <input type="text" id="newMedNote" placeholder="メモ（例：頭痛・解熱）" maxlength="30">
    <div class="section-label">色</div>
    <div class="color-picker" id="colorPicker"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeAddModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="addMedicine()">追加</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ===== DATA =====
const COLORS = ['#7c6af7','#4fd1a1','#f76a6a','#f7b96a','#6ab4f7','#f76adc','#a3f76a','#f7f06a'];
const DEFAULT_MEDS = [
  { id: 1, name: 'ロキソニン', note: '頭痛・解熱', color: '#f76a6a' },
  { id: 2, name: 'デパス', note: '不安・緊張', color: '#7c6af7' },
];

let medicines = JSON.parse(localStorage.getItem('tonpuku_meds') || 'null') || DEFAULT_MEDS;
let records = JSON.parse(localStorage.getItem('tonpuku_records') || '[]');
let selectedTablets = 1;
let selectedColor = COLORS[0];
let calendarDate = new Date();

function save() {
  localStorage.setItem('tonpuku_meds', JSON.stringify(medicines));
  localStorage.setItem('tonpuku_records', JSON.stringify(records));
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('dateStr').textContent =
    now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
}
setInterval(updateClock, 1000);
updateClock();

// ===== PAGE NAV =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'log') renderLog('all');
  if (name === 'stats') renderStats();
  if (name === 'settings') renderSettings();
}

// ===== TABLET SELECT =====
function selectTablets(btn, n) {
  selectedTablets = n;
  document.querySelectorAll('.tablet-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ===== MEDICINE GRID =====
function renderMedicineGrid() {
  const grid = document.getElementById('medicineGrid');
  const today = new Date().toDateString();
  grid.innerHTML = medicines.map(m => {
    const todayCount = records.filter(r => r.medId === m.id && new Date(r.ts).toDateString() === today)
      .reduce((s, r) => s + r.tablets, 0);
    return `<button class="med-btn" onclick="record(${m.id}, this)" style="--med-color:${m.color}">
      <div class="med-dot" style="background:${m.color}"></div>
      <div class="med-name">${m.name}</div>
      <div class="med-dose">${m.note}</div>
      ${todayCount > 0 ? `<div class="med-count-badge">今日 ${todayCount}錠</div>` : ''}
    </button>`;
  }).join('');
}

function record(medId, btn) {
  const med = medicines.find(m => m.id === medId);
  records.push({ id: Date.now(), medId, medName: med.name, medColor: med.color, tablets: selectedTablets, ts: new Date().toISOString() });
  save();
  btn.classList.remove('flash');
  void btn.offsetWidth;
  btn.classList.add('flash');
  showToast(`${med.name} ${selectedTablets}錠 を記録しました`);
  renderMedicineGrid();
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== ADD MEDICINE MODAL =====
function openAddModal() {
  document.getElementById('newMedName').value = '';
  document.getElementById('newMedNote').value = '';
  selectedColor = COLORS[0];
  renderColorPicker();
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('newMedName').focus(), 200);
}
function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}
function renderColorPicker() {
  document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
    `<div class="color-dot${c === selectedColor ? ' selected' : ''}" style="background:${c}" onclick="pickColor('${c}', this)"></div>`
  ).join('');
}
function pickColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}
function addMedicine() {
  const name = document.getElementById('newMedName').value.trim();
  if (!name) { document.getElementById('newMedName').focus(); return; }
  medicines.push({ id: Date.now(), name, note: document.getElementById('newMedNote').value.trim(), color: selectedColor });
  save();
  closeAddModal();
  renderMedicineGrid();
  renderFilterChips();
  if (document.getElementById('page-settings').classList.contains('active')) renderSettings();
  showToast(`${name} を追加しました`);
}

// ===== LOG =====
let currentFilter = 'all';
function filterLog(btn, id) {
  currentFilter = id;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderLog(id);
}
function renderFilterChips() {
  const container = document.getElementById('logFilter');
  container.innerHTML = `<button class="filter-chip${currentFilter==='all'?' active':''}" onclick="filterLog(this,'all')">すべて</button>`;
  medicines.forEach(m => {
    container.innerHTML += `<button class="filter-chip${currentFilter===m.id?' active':''}" onclick="filterLog(this,${m.id})" style="--c:${m.color}">${m.name}</button>`;
  });
}
function renderLog(filter) {
  renderFilterChips();
  const list = document.getElementById('logList');
  let recs = [...records].reverse();
  if (filter !== 'all') recs = recs.filter(r => r.medId === filter);
  if (!recs.length) {
    list.innerHTML = `<div class="empty"><span class="emoji">📋</span>記録がありません</div>`;
    return;
  }
  const groups = {};
  recs.forEach(r => {
    const d = new Date(r.ts).toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
    (groups[d] = groups[d] || []).push(r);
  });
  list.innerHTML = Object.entries(groups).map(([date, items]) =>
    `<div class="log-group">
      <div class="log-date-header">${date}</div>
      ${items.map(r => `
        <div class="log-item">
          <div class="log-dot" style="background:${r.medColor}"></div>
          <div class="log-info">
            <div class="log-name">${r.medName}</div>
            <div class="log-detail">${r.tablets}錠</div>
          </div>
          <div class="log-time">${new Date(r.ts).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</div>
          <button class="log-delete" onclick="deleteRecord(${r.id})">×</button>
        </div>`).join('')}
    </div>`
  ).join('');
}
function deleteRecord(id) {
  if (!confirm('この記録を削除しますか？')) return;
  records = records.filter(r => r.id !== id);
  save();
  renderLog(currentFilter);
  renderMedicineGrid();
}

// ===== STATS =====
function renderStats() {
  // Summary cards
  const today = new Date().toDateString();
  const todayTotal = records.filter(r => new Date(r.ts).toDateString() === today).reduce((s,r) => s+r.tablets, 0);
  const thisMonth = records.filter(r => { const d=new Date(r.ts); return d.getMonth()===new Date().getMonth() && d.getFullYear()===new Date().getFullYear(); });
  const monthTotal = thisMonth.reduce((s,r) => s+r.tablets, 0);
  const allDays = [...new Set(records.map(r => new Date(r.ts).toDateString()))].length;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">今日</div><div class="stat-value">${todayTotal}</div><div class="stat-sub">錠</div></div>
    <div class="stat-card"><div class="stat-label">今月</div><div class="stat-value">${monthTotal}</div><div class="stat-sub">錠 / ${thisMonth.length}回</div></div>
    <div class="stat-card"><div class="stat-label">総服用回数</div><div class="stat-value">${records.length}</div><div class="stat-sub">回</div></div>
    <div class="stat-card"><div class="stat-label">服用した日数</div><div class="stat-value">${allDays}</div><div class="stat-sub">日</div></div>
  `;
  renderCalendar();
  renderBarChart();
}

// ===== CALENDAR =====
function changeMonth(d) { calendarDate.setMonth(calendarDate.getMonth()+d); renderCalendar(); }
function renderCalendar() {
  const y = calendarDate.getFullYear(), m = calendarDate.getMonth();
  document.getElementById('calTitle').textContent = `${y}年${m+1}月`;
  const first = new Date(y, m, 1);
  const last = new Date(y, m+1, 0);
  const startDay = first.getDay();
  const today = new Date();

  const recordDays = {};
  records.forEach(r => {
    const d = new Date(r.ts);
    if (d.getFullYear()===y && d.getMonth()===m) {
      const k = d.getDate();
      recordDays[k] = (recordDays[k]||0) + r.tablets;
    }
  });

  let cells = '<div class="cal-day-name">日</div><div class="cal-day-name">月</div><div class="cal-day-name">火</div><div class="cal-day-name">水</div><div class="cal-day-name">木</div><div class="cal-day-name">金</div><div class="cal-day-name">土</div>';
  for (let i=0; i<startDay; i++) cells += '<div class="cal-cell other-month"></div>';
  for (let d=1; d<=last.getDate(); d++) {
    const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
    const hasRec = recordDays[d];
    cells += `<div class="cal-cell${isToday?' today':''}${hasRec?' has-record':''}">${d}${hasRec?'<div class="cal-dot"></div>':''}</div>`;
  }
  document.getElementById('calGrid').innerHTML = cells;
}

// ===== BAR CHART =====
function renderBarChart() {
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toDateString();
    const total = records.filter(r => new Date(r.ts).toDateString()===key).reduce((s,r)=>s+r.tablets,0);
    days.push({ label: ['日','月','火','水','木','金','土'][d.getDay()], total });
  }
  const max = Math.max(...days.map(d=>d.total), 1);
  document.getElementById('barChart').innerHTML = days.map(d => `
    <div class="bar-col">
      <div class="bar" style="height:${Math.round((d.total/max)*90)}px; opacity:${d.total?1:0.2}"></div>
      <div class="bar-label">${d.label}</div>
    </div>
  `).join('');
}

// ===== SETTINGS =====
function renderSettings() {
  document.getElementById('medManageList').innerHTML = medicines.map(m => `
    <div class="med-manage-item">
      <div class="med-dot" style="background:${m.color};width:12px;height:12px;border-radius:50%"></div>
      <div>
        <div style="font-size:15px;font-weight:500">${m.name}</div>
        ${m.note ? `<div style="font-size:12px;color:var(--text-muted)">${m.note}</div>` : ''}
      </div>
      <button class="del-btn" onclick="deleteMed(${m.id})">削除</button>
    </div>
  `).join('') || `<div class="empty"><span class="emoji">💊</span>薬が登録されていません</div>`;
}
function deleteMed(id) {
  const med = medicines.find(m=>m.id===id);
  if (!confirm(`「${med.name}」を削除しますか？\n(服用記録は残ります)`)) return;
  medicines = medicines.filter(m=>m.id!==id);
  save();
  renderSettings();
  renderMedicineGrid();
}

// ===== INIT =====
renderMedicineGrid();
renderFilterChips();

// Close modal on overlay click
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});
</script>
